<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Жим программа</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      padding: 16px;
      line-height: 1.4;
    }

    label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
    }

    input {
      padding: 10px;
      font-size: 16px;
      width: 180px;
      margin-bottom: 16px;
      box-sizing: border-box;
    }

    .table-wrap {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      border: 1px solid #ddd;
      border-radius: 8px;
    }

    table {
      width: 100%;
      min-width: 900px;
      border-collapse: collapse;
      background: #fff;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      vertical-align: top;
      text-align: left;
    }

    th {
      background: #f5f5f5;
    }
  </style>
</head>
<body>
  <label for="pm">Текущий ПМ в жиме:</label>
  <input id="pm" type="number" min="1" step="0.5" value="100" inputmode="decimal" />

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Неделя</th>
          <th>День 1 — тяжелый жим</th>
          <th>День 2 — легкий / средний жим</th>
          <th>Подсобка</th>
        </tr>
      </thead>
      <tbody id="plan-body"></tbody>
    </table>
  </div>

  <script>
    const plan = [
      { week: 1, d1: "5x5 на 70%", d2: "6x3 на 65%", aux: "Узкий хват 3x8, трицепс 3x10, задняя дельта" },
      { week: 2, d1: "5x5 на 72,5%", d2: "5x4 на 67,5%", aux: "Жим гантелей 3x8, трицепс 3x10, верх спины" },
      { week: 3, d1: "5x4 на 75%", d2: "6x3 на 70%", aux: "Жим с паузой 3x5, трицепс 3x10" },
      { week: 4, d1: "5x4 на 77,5%", d2: "4x5 на 70%", aux: "Узкий хват 3x6–8, задняя дельта, спина" },
      { week: 5, d1: "6x3 на 80%", d2: "5x4 на 72,5%", aux: "Дожимы 3x5, трицепс 3x10" },
      { week: 6, d1: "6x3 на 82,5%", d2: "4x5 на 70%", aux: "Жим гантелей 3x8, плечи, спина" },
      { week: 7, d1: "5x3 на 85%", d2: "6x2 на 75%", aux: "Жим с паузой 3x3, трицепс 3x8" },
      { week: 8, d1: "5x3 на 87,5%", d2: "4x4 на 72,5%", aux: "Узкий хват 3x5–6, задняя дельта" },
      { week: 9, d1: "6x2 на 87,5%", d2: "5x3 на 75%", aux: "Дожимы 3x4, трицепс, верх спины" },
      { week: 10, d1: "6x2 на 90%", d2: "4x3 на 72,5%", aux: "Жим гантелей 2–3x8, плечи" },
      { week: 11, d1: "5x2 на 90%", d2: "4x2 на 75%", aux: "Легкая подсобка, без отказа" },
      { week: 12, d1: "3x2 на 85%", d2: "3x3 на 65%", aux: "Снижение объема, восстановление" },
      { week: 13, d1: "Разминка + выход на максимум", d2: "Отдых", aux: "Тест 1ПМ" }
    ];

    const pmInput = document.getElementById("pm");
    const body = document.getElementById("plan-body");

    function roundDownTo2_5(value) {
      return Math.floor(value / 2.5) * 2.5;
    }

    function formatKg(value) {
      return value.toFixed(1).replace(/\.0$/, "").replace(".", ",") + " кг";
    }

    function percentToKg(percentStr, pm) {
      const p = parseFloat(percentStr.replace(",", "."));
      if (Number.isNaN(p)) return percentStr;
      return formatKg(roundDownTo2_5(pm * p / 100));
    }

    function convertText(text, pm) {
      return text.replace(/(\d{1,3}(?:[,.]\d{1,2})?)%/g, (_, percent) => percentToKg(percent, pm));
    }

    function render() {
      const pm = parseFloat(pmInput.value) || 0;
      body.innerHTML = plan.map(row => `
        <tr>
          <td>${row.week}</td>
          <td>${convertText(row.d1, pm)}</td>
          <td>${convertText(row.d2, pm)}</td>
          <td>${row.aux}</td>
        </tr>
      `).join("");
    }

    pmInput.addEventListener("input", render);
    render();
  </script>
</body>
</html>
